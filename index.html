            color: var(--osrs-header);

    function getCountryName(tag) { return countryNames[tag] || tag; }

    let globalWarsData = [];
    let globalProvincesData = {};
    let masterMapInstance = null;
    let currentMapMarkers = [];

    let panelMinimapInstance = null;
    let minimapMarkers = [];

    function updateMinimap(tag) {
        if (!panelMinimapInstance) {
            panelMinimapInstance = L.map('panel-minimap', {
                zoomControl: true,
                dragging: true,
                touchZoom: true,
                scrollWheelZoom: true,
                doubleClickZoom: true,
                boxZoom: true,
                keyboard: false,
                attributionControl: false
            }).setView([20, 0], 1);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(panelMinimapInstance);
        }

        minimapMarkers.forEach(m => panelMinimapInstance.removeLayer(m));
        minimapMarkers = [];

        const provinces = globalProvincesData[tag] || [];
        let bounds = L.latLngBounds();
        let plotted = 0;
        let missing = 0;

        provinces.forEach(p => {
            let provinceName = p.name || `Province ${p.id}`;
            let coords = provinceCoords[provinceName];
            if (!coords) {
                const lowerKey = Object.keys(provinceCoords).find(k => k.toLowerCase() === provinceName.toLowerCase());
                if (lowerKey) coords = provinceCoords[lowerKey];
            }
            if (coords) {
                let marker = L.circleMarker(coords, {
                    color: '#104e8b',
                    fillColor: '#1e90ff',
                    fillOpacity: 0.7,
                    radius: 6,
                    weight: 2
                }).addTo(panelMinimapInstance);
                minimapMarkers.push(marker);
                bounds.extend(coords);
                plotted++;
            } else {
                missing++;
            }
        });

        if (plotted > 0) {
            panelMinimapInstance.fitBounds(bounds, { padding: [15, 15], maxZoom: 5 });
        } else {
            panelMinimapInstance.setView([20, 0], 1);
        }

        if (missing > 0) {
            console.warn(`Missing coordinates for ${missing} owned province(s) of ${tag}.`);
        }
    }

    function toggleCountryPanel(event) {
        if (!event) return;
        if (event.target.closest('#panel-title-link')) return;
        const panelContent = document.querySelector('#country-panel .panel-content');
        if (!panelContent) return;
        const isHidden = panelContent.style.display === 'none' || getComputedStyle(panelContent).display === 'none';
        panelContent.style.display = isHidden ? 'block' : 'none';
    }

    function processSaveFile() {
        const fileInput = document.getElementById('saveFile');
        const output = document.getElementById('output');
        const tagSelect = document.getElementById('countryTag');

        if (!fileInput.files.length) return;

        const file = fileInput.files[0];
        output.innerHTML = '<div style="padding: 20px; background: var(--osrs-input-bg); border: 2px solid var(--osrs-border);">Reading and indexing file...</div>';
        
        tagSelect.innerHTML = '<option value="">Processing...</option>';
        tagSelect.disabled = true;

        const reader = new FileReader();
        reader.onload = function(e) {
            window.rawSaveText = e.target.result; 

            setTimeout(() => {
                try { parseEntireSave(e.target.result); } 
                catch (error) { output.innerHTML = `<div style="padding: 20px; color: red;">Error: ${error.message}</div>`; }
            }, 50);
        };
        reader.readAsText(file, "windows-1252");
    }

    function parseEntireSave(text) {
        globalWarsData = [];
        globalProvincesData = {};
        let availableTags = new Set();
        let playerTag = null;
        const playerMatch = text.substring(0, 5000).match(/player="([A-Z0-9]{3})"/);
        if (playerMatch) playerTag = playerMatch[1];

        let inWarBlock = false, inBattleBlock = false;
        let inAttackerBlock = false, inDefenderBlock = false;
        let warDepth = 0, battleDepth = 0, bracketDepth = 0;
        let currentWar = null, currentBattle = {};

        const lines = text.split(/\r?\n/);

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();

            if (line.includes("{")) bracketDepth += (line.match(/\{/g) || []).length;
            if (line.includes("}")) {
                bracketDepth -= (line.match(/\}/g) || []).length;
                if (inWarBlock && bracketDepth < warDepth) {
                    inWarBlock = false;
                    if (Object.keys(currentWar.participants).length > 0) globalWarsData.push(currentWar);
                    currentWar = null;
                }
            }

            if (line.startsWith("previous_war=") || line.startsWith("active_war=")) {
                inWarBlock = true;
                warDepth = bracketDepth + (!line.includes("{") ? 1 : 0);
                currentWar = { id: globalWarsData.length, name: "Unknown War", participants: {}, startYear: 9999, endYear: 0, battles: [] };
                continue;
            }

            if (inWarBlock) {
                if (line.startsWith("name=") && currentWar.name === "Unknown War") currentWar.name = line.split("=")[1].replace(/"/g, '');
                let dateMatch = line.match(/(18\d{2}|19\d{2})\.\d{1,2}\.\d{1,2}/);
                if (dateMatch) {
                    let year = parseInt(dateMatch[1]);
                    if (year >= 1836 && year <= 1936) { 
                        if (year < currentWar.startYear) currentWar.startYear = year;
                        if (year > currentWar.endYear) currentWar.endYear = year;
                    }
                }

                if (line.startsWith("battle=")) {
                    inBattleBlock = true; battleDepth = bracketDepth;
                    currentBattle = { name: "Unknown Location", attacker: "", attacker_losses: 0, defender: "", defender_losses: 0 };
                }

                if (inBattleBlock) {
                    if (line.startsWith("name=")) currentBattle.name = line.split("=")[1].replace(/"/g, '');
                    if (line.startsWith("result=")) currentBattle.result = line.split("=")[1].replace(/"/g, ''); 
                    
                    if (line.startsWith("attacker=")) { inAttackerBlock = true; inDefenderBlock = false; } 
                    else if (line.startsWith("defender=")) { inAttackerBlock = false; inDefenderBlock = true; }
                    
                    if (line.startsWith("country=")) {
                        const country = line.split("=")[1].replace(/"/g, '');
                        if (inAttackerBlock) currentBattle.attacker = country; else if (inDefenderBlock) currentBattle.defender = country;
                    }
                    if (line.startsWith("leader=")) {
                        const leader = line.split("=")[1].replace(/"/g, '');
                        if (inAttackerBlock) currentBattle.attacker_leader = leader; else if (inDefenderBlock) currentBattle.defender_leader = leader;
                    }
                    if (line.startsWith("losses=")) {
                        const losses = parseInt(line.split("=")[1]);
                        if (inAttackerBlock) currentBattle.attacker_losses = losses; else if (inDefenderBlock) currentBattle.defender_losses = losses;
                    }

                    if (bracketDepth <= battleDepth && line === "}") {
                        inBattleBlock = false; inAttackerBlock = false; inDefenderBlock = false;
                        const att = currentBattle.attacker, def = currentBattle.defender;
                        if (att && def) {
                            availableTags.add(att); availableTags.add(def);
                            if (!currentWar.participants[att]) currentWar.participants[att] = { kills: 0, deaths: 0 };
                            if (!currentWar.participants[def]) currentWar.participants[def] = { kills: 0, deaths: 0 };
                            currentWar.participants[att].deaths += currentBattle.attacker_losses;
                            currentWar.participants[att].kills += currentBattle.defender_losses;
                            currentWar.participants[def].deaths += currentBattle.defender_losses;
                            currentWar.participants[def].kills += currentBattle.attacker_losses;
                            
                            if (!currentBattle.attacker_leader) currentBattle.attacker_leader = "No Commander";
                            if (!currentBattle.defender_leader) currentBattle.defender_leader = "No Commander";
                            
                            currentWar.battles.push({...currentBattle});
                        }
                    }
                }
            }
        }

        const select = document.getElementById("countryTag");
        select.innerHTML = "";
        let tagsArray = Array.from(availableTags).sort();
        
        if (tagsArray.length === 0) {
            select.innerHTML = '<option value="">No war data found</option>';
            document.getElementById('output').innerHTML = '<div style="padding: 20px;">No battles with casualties were found.</div>';
            return;
        }

        tagsArray.forEach(tag => {
            let opt = document.createElement("option");
            opt.value = tag;
            opt.innerText = `${getCountryName(tag)} (${tag})`;
            if (tag === playerTag) { opt.selected = true; opt.innerText += " - Player"; }
            select.appendChild(opt);
        });

        if (!select.value && tagsArray.length > 0) select.value = tagsArray[0];
        select.disabled = false;
        
        document.getElementById('country-panel').style.display = 'block';
        
        globalWarsData.forEach((w, idx) => w.id = idx);
        
        // Parse provinces in a separate pass
        parseProvinces(text);
        
        renderResults();
    }

    function parseProvinces(text) {
        globalProvincesData = {};
        const lines = text.split(/\r?\n/);
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            
            if (/^\d+=$/.test(line)) {
                let provinceId = line.replace('=', '');
                let province = { id: provinceId };
                
                // Parse the province block
                i++; // Move to the opening brace
                let braceCount = 1;
                
                while (i < lines.length && braceCount > 0) {
                    i++;
                    line = lines[i].trim();
                    
                    if (line.includes('{')) braceCount++;
                    if (line.includes('}')) braceCount--;
                    
                    if (braceCount === 1) {
                        if (line.startsWith('name=')) {
                            province.name = line.split('=')[1].replace(/"/g, '');
                        } else if (line.startsWith('owner=')) {
                            province.owner = line.split('=')[1].replace(/"/g, '');
                        }
                    }
                }
                
                if (province.owner) {
                    if (!globalProvincesData[province.owner]) {
                        globalProvincesData[province.owner] = [];
                    }
                    globalProvincesData[province.owner].push(province);
                    console.log('Added province', province.name, 'to', province.owner);
                }
            }
        }
    }

    function initMasterMap() {
        if (!masterMapInstance) {
            masterMapInstance = L.map('masterMap', {
                zoomControl: true,        
                dragging: true,           
                touchZoom: true,          
                scrollWheelZoom: true,    
                doubleClickZoom: true,    
                boxZoom: true,
                keyboard: true,
                attributionControl: false
            }).setView([48.8566, 2.3522], 4);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(masterMapInstance);
        }
    }

    function viewWarOnMap(warId) {
        initMasterMap();
        
        const missingDiv = document.getElementById('missingLocations');
        if (typeof provinceCoords === 'undefined') {
            missingDiv.style.display = 'block';
            missingDiv.innerHTML = `<b style="color: red; font-size: 1.1rem;">ERROR: coordinates.js is missing or broken!</b><br>Make sure the file is in the exact same folder as index.html, and that you haven't accidentally deleted a bracket or comma inside it.`;
            return;
        }

        currentMapMarkers.forEach(m => masterMapInstance.removeLayer(m));
        currentMapMarkers = [];

        const war = globalWarsData.find(w => w.id === warId);
        if (!war) return;

        let bounds = L.latLngBounds();
        let missingLocs = new Set();
        let plottedCount = 0;

        war.battles.forEach(b => {
            let placeName = b.name.replace(/^.*?(Battle|Siege|Liberation|Occupation)\s+of\s+/i, '').replace(/^The\s+/i, '').trim();
            
            let coords = provinceCoords[placeName];
            if (!coords) {
                const lowerKey = Object.keys(provinceCoords).find(k => k.toLowerCase() === placeName.toLowerCase());
                if (lowerKey) coords = provinceCoords[lowerKey];
            }
            
            if (coords) {
                let winnerText = "Unknown";
                if (b.result === "yes") winnerText = `<span style="color: green; font-weight: bold;">${getCountryName(b.attacker)} Victory</span>`;
                else if (b.result === "no") winnerText = `<span style="color: green; font-weight: bold;">${getCountryName(b.defender)} Victory</span>`;

                let popupHTML = `
                    <div style="font-family: 'Times New Roman', serif; min-width: 220px;">
                        <h4 style="margin: 0 0 10px 0; border-bottom: 1px solid #3e3529; padding-bottom: 5px; color: #4a0000; font-size: 1.1rem;">
                            ${b.name}
                        </h4>
                        <p style="margin: 0 0 5px 0;"><b>Result:</b> ${winnerText}</p>
                        
                        <div style="margin-top: 10px; background: #f1e5cd; padding: 5px; border: 1px solid #3e3529;">
                            <b style="color: #4a0000;">Attacker:</b> ${getCountryName(b.attacker)}<br>
                            <b>General:</b> ${b.attacker_leader}<br>
                            <b>Sacrifices:</b> ${b.attacker_losses.toLocaleString()}
                        </div>
                        
                        <div style="margin-top: 5px; background: #f1e5cd; padding: 5px; border: 1px solid #3e3529;">
                            <b style="color: #004a00;">Defender:</b> ${getCountryName(b.defender)}<br>
                            <b>General:</b> ${b.defender_leader}<br>
                            <b>Sacrifices:</b> ${b.defender_losses.toLocaleString()}
                        </div>
                    </div>
                `;

                let marker = L.circleMarker(coords, {
                    color: '#4a0000', fillColor: '#ff0000', fillOpacity: 0.8, radius: 6 
                }).bindPopup(popupHTML).addTo(masterMapInstance);
                
                currentMapMarkers.push(marker);
                bounds.extend(coords);
                plottedCount++;
            } else {
                missingLocs.add(placeName);
            }
        });

        if (plottedCount > 0) {
            masterMapInstance.fitBounds(bounds, { padding: [30, 30], maxZoom: 6 });
        } else {
            masterMapInstance.setView([48.8566, 2.3522], 4);
        }

        if (missingLocs.size > 0) {
            missingDiv.style.display = 'block';
            missingDiv.innerHTML = `<b>Missing coordinates for:</b><br>${Array.from(missingLocs).join(', ')}<br><br><i>Add these to coordinates.js to map them.</i>`;
        } else {
            missingDiv.style.display = 'none';
        }
    }

    function analyzeStrategy(tag, text) {
        if (!text) return ""; 

        let strategyHTML = `<div style="background: #f1e5cd; border: 2px solid #3e3529; padding: 15px; margin-bottom: 20px;">
                            <h3 style="color: #4a0000; margin-top: 0; border-bottom: 1px dashed #3e3529; padding-bottom: 5px;">Chief of Staff Assessment</h3>
                            <ul style="margin-bottom: 0; font-size: 1.05rem;">`;
        
        let regex = new RegExp(`(?:^|\\n)${tag}=\\r?\\n\\{`);
        let match = text.match(regex);
        if (!match) return ""; 
        
        let tagIndex = match.index;
        let nextTagRegex = /\n[A-Z0-9]{3}=\r?\n\{/;
        let textAfterTag = text.substring(tagIndex + 10);
        let nextMatch = textAfterTag.match(nextTagRegex);
        
        let endIndex = nextMatch ? (tagIndex + 10 + nextMatch.index) : text.length;
        let countryChunk = text.substring(tagIndex, endIndex); 
        
        let infamyMatch = countryChunk.match(/badboy=(-?[0-9.]+)/);
        let moneyMatch = countryChunk.match(/money=(-?[0-9.]+)/);
        
        let infamy = infamyMatch ? parseFloat(infamyMatch[1]) : 0;
        let money = moneyMatch ? parseFloat(moneyMatch[1]) : 0;

        const validCBs = [];
        const cbRegex = /casus_belli=\s*\{([^}]*)\}/g;
        let cbMatch;
        while ((cbMatch = cbRegex.exec(text)) !== null) {
            const block = cbMatch[1];
            const typeMatch = block.match(/type="([^"]+)"/);
            const firstMatch = block.match(/first="([A-Z0-9]{3})"/);
            const secondMatch = block.match(/second="([A-Z0-9]{3})"/);
            if (!typeMatch || !firstMatch || !secondMatch) continue;
            const type = typeMatch[1];
            if (type === 'nocasusbelli') continue;
            const first = firstMatch[1];
            const second = secondMatch[1];
            let opponent = null;
            if (first === tag) opponent = second;
            else if (second === tag) opponent = first;
            if (!opponent) continue;
            validCBs.push({ type, opponent });
        }
        
        if (infamy > 24.9) {
            strategyHTML += `<li style="color: red; font-weight: bold;">CRITICAL: Your Infamy is ${infamy.toFixed(2)}! Halt all expansion immediately or face a global containment war.</li>`;
        } else if (infamy > 15) {
            strategyHTML += `<li>Caution: Infamy is getting high (${infamy.toFixed(2)}). Let it burn off before fabricating new claims.</li>`;
        } else {
            strategyHTML += `<li>Diplomacy: Infamy is safe (${infamy.toFixed(2)}). You have geopolitical room to fabricate a Casus Belli if desired.</li>`;
        }

        if (validCBs.length > 0) {
            const cbDescriptions = validCBs.map(cb => {
                const opponentName = countryNames[cb.opponent] || cb.opponent;
                return `${opponentName} (${cb.type.replace(/_/g, ' ')})`;
            }).join(', ');
            strategyHTML += `<li>Opportunities: current valid Casus Belli exists against ${cbDescriptions}.</li>`;
        }

        if (money < 0) {
            strategyHTML += `<li style="color: red; font-weight: bold;">Economy: You are in debt (£${money.toLocaleString(undefined, {maximumFractionDigits: 0})})! Raise tariffs, cut military maintenance, or prioritize commerce technologies.</li>`;
        } else if (money > 10000) {
            strategyHTML += `<li>Economy: Treasury is flush (£${money.toLocaleString(undefined, {maximumFractionDigits: 0})}). Subsidize key industries, build forts, or expand naval bases to project power.</li>`;
        } else {
            strategyHTML += `<li>Economy: Treasury is stable (£${money.toLocaleString(undefined, {maximumFractionDigits: 0})}). Maintain a positive daily balance to avoid high-interest loans.</li>`;
        }
        
        strategyHTML += `</ul></div>`;
        return strategyHTML;
    }

    function renderResults() {
        const tagSelect = document.getElementById('countryTag');
        const output = document.getElementById('output');
        const selectedTag = tagSelect.value;
        
        if (!selectedTag) return;

        const countryName = getCountryName(selectedTag); 
        const titleLink = document.getElementById('panel-title-link');
        titleLink.textContent = countryName + " ↗";
        
        const wikiSearchTerm = encodeURIComponent(countryName.replace(/ /g, '_'));
        titleLink.href = `https://en.wikipedia.org/wiki/${wikiSearchTerm}`;
        
        updateMinimap(selectedTag);

        // Update provinces list
        const provincesList = document.getElementById('provinces-list');
        provincesList.innerHTML = '<div>Test: Provinces list is working</div>';

        let displayData = [];
        globalWarsData.forEach(war => {
            if (war.participants[selectedTag]) {
                const defeats = war.participants[selectedTag].kills;
                const sacrifices = war.participants[selectedTag].deaths;
                const ds_ratio = sacrifices > 0 ? +(defeats / sacrifices).toFixed(2) : defeats;
                
                let yearString = "";
                if (war.startYear !== 9999) {
                    let endText = (war.endYear === 0 || war.endYear === war.startYear) ? "" : ` - ${war.endYear}`;
                    yearString = ` (${war.startYear}${endText})`;
                }
                displayData.push({ warObj: war, defeats: defeats, sacrifices: sacrifices, ds_ratio: ds_ratio, yearString: yearString });
            }
        });

        displayData.sort((a, b) => {
            if (b.defeats !== a.defeats) return b.defeats - a.defeats;
            return b.ds_ratio - a.ds_ratio;
        });

        if (displayData.length === 0) {
            output.innerHTML = `<div style="padding: 20px;">No data found for ${getCountryName(selectedTag)}.</div>`;
            return;
        }

        let html = `
        <h2 style="color: var(--osrs-title); border-bottom: 2px solid var(--osrs-border); padding-bottom: 10px;">
            Analyzer Report: ${getCountryName(selectedTag)}
        </h2>
        
        ${analyzeStrategy(selectedTag, window.rawSaveText)}

        <div class="dashboard-layout">
            <div class="left-column">
        `;
        
        displayData.forEach((r, idx) => {
            html += `
            <div class="war-card">
                <div class="war-header">
                    <h3>${idx + 1}. ${r.warObj.name}${r.yearString}</h3>
                    <button class="map-btn" onclick="viewWarOnMap(${r.warObj.id})">View on Map</button>
                </div>
                <div class="war-stats">
<b>Total Defeats:</b>    ${r.defeats.toLocaleString()}
<b>Total Sacrifices:</b> ${r.sacrifices.toLocaleString()}
<b>D/S Ratio:</b>        ${r.ds_ratio}

<b>Battles Logged:</b>   ${r.warObj.battles.length}
                </div>
            </div>`;
        });

        html += `
            </div>
            <div class="right-column">
                <div id="masterMap"></div>
                <div id="missingLocations" class="missing-locs"></div>
            </div>
        </div>`;

        output.innerHTML = html;
        initMasterMap();
    }
</script>
